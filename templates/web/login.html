<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>MAHIR HOST | Ultra Pro Max</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');

        :root { 
            --bg: #050505; 
            --card: rgba(18, 18, 22, 0.7); 
            --accent: #007aff; 
            --border: rgba(255, 255, 255, 0.08); 
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --glass: blur(12px);
            --terminal-bg: #0d0d0f;
            --green: #32d74b;
            --orange: #ff9f0a;
            --danger: #ff453a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main);
            background-image: radial-gradient(circle at 0% 0%, rgba(0, 122, 255, 0.05) 0%, transparent 40%);
            min-height: 100vh; overflow-x: hidden;
        }

        .topbar { display: flex; justify-content: space-between; padding: 12px 20px; background: rgba(10, 10, 12, 0.8); backdrop-filter: var(--glass); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo-box { display: flex; align-items: center; gap: 10px; font-weight: 800; }
        .logo-icon { background: linear-gradient(135deg, #ff0055, #7000ff); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; }

        .container { padding: 20px 15px; max-width: 800px; margin: auto; }

        /* Pterodactyl Style Console */
        #console-wrapper { background: var(--terminal-bg); border-radius: 12px; border: 1px solid #2a2a2e; overflow: hidden; margin-bottom: 15px; }
        .terminal-header { background: #1a1a1d; padding: 8px 15px; border-bottom: 1px solid #2a2a2e; display: flex; justify-content: space-between; align-items: center; font-family: 'JetBrains Mono'; font-size: 10px; color: #888; }
        #console { height: 300px; padding: 15px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.5; color: #d1d1d1; }
        .terminal-input-area { background: #121214; padding: 10px 15px; border-top: 1px solid #2a2a2e; display: flex; align-items: center; gap: 10px; }
        .terminal-input-area input { background: transparent; border: none; color: var(--green); flex: 1; font-family: 'JetBrains Mono'; font-size: 13px; outline: none; }
        .log-line { margin-bottom: 2px; }
        .log-time { color: #5c6370; margin-right: 8px; }

        .srv-card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); transition: 0.3s; backdrop-filter: var(--glass); }
        .btn { padding: 10px 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-blue { background: var(--accent); color: white; }
        .btn-gray { background: #1c1c1e; color: #fff; border: 1px solid var(--border); }
        .btn-green { background: var(--green); color: #000; }
        .btn-orange { background: var(--orange); color: #000; }
        .btn-danger { background: var(--danger); color: #fff; }

        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .file-item .file-actions { display: flex; gap: 8px; }
        .file-item .file-actions button { padding: 4px 8px; border-radius: 6px; border: none; font-size: 10px; font-weight: 700; cursor: pointer; }

        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .menu-content { background: #1c1c22; width: 280px; border-radius: 20px; border: 1px solid var(--border); }
        .menu-item { padding: 14px 20px; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .menu-item:hover { background: rgba(255,255,255,0.05); }
        
        #editor { display:none; position:fixed; inset:0; background:var(--bg); z-index:6000; padding:15px; }
        .CodeMirror { height: 85vh; border-radius: 12px; font-size: 14px; }

        .startup-badge {
            background: rgba(255, 159, 10, 0.15);
            color: var(--orange);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            border: 1px solid rgba(255, 159, 10, 0.2);
        }

        /* Breadcrumb */
        .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); margin-bottom: 10px; flex-wrap: wrap; }
        .breadcrumb span { cursor: pointer; color: var(--accent); }
        .breadcrumb span:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo-box">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <span>MAHIR HOST</span>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-gray" onclick="location.href='/logout'"><i class="fas fa-sign-out-alt"></i></button>
    </div>
</div>

<div class="container" id="homeView">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0;">Instances</h2>
        <button class="btn btn-blue" onclick="createServer()"><i class="fas fa-plus"></i> Create</button>
    </div>
    <div id="srvList"></div>
</div>

<div class="container" id="manageView" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <button class="btn btn-gray" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <div style="display:flex; align-items:center; gap:12px;">
            <span id="vStartup" class="startup-badge">Startup: main.py</span>
            <span id="vUptime" style="font-size:11px; font-family:'JetBrains Mono'; color:var(--text-dim);">OFFLINE</span>
        </div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px;">
        <button class="btn btn-green" style="justify-content:center" onclick="srvAction('start')"><i class="fas fa-play"></i> START</button>
        <button class="btn btn-orange" style="justify-content:center" onclick="srvAction('restart')"><i class="fas fa-sync"></i> RESTART</button>
        <button class="btn btn-danger" style="justify-content:center" onclick="srvAction('stop')"><i class="fas fa-stop"></i> STOP</button>
    </div>

    <div id="console-wrapper">
        <div class="terminal-header">
            <span><i class="fas fa-terminal"></i> CONSOLE</span>
            <span id="vSrvName" style="color:var(--accent)">-</span>
        </div>
        <div id="console"></div>
        <div class="terminal-input-area">
            <span style="color:var(--accent); font-weight:bold;">$</span>
            <input type="text" id="termCmd" placeholder="Type a command..." onkeydown="if(event.key==='Enter') sendConsoleCommand()">
        </div>
    </div>

    <div style="background:var(--card); border-radius:18px; border:1px solid var(--border); overflow:hidden; margin-top:15px;">
        <div style="padding:15px; background:rgba(255,255,255,0.03); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:800; font-size:13px;">FILE MANAGER</span>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-gray" style="padding:5px 10px" onclick="document.getElementById('fUp').click()"><i class="fas fa-upload"></i></button>
                <button class="btn btn-gray" style="padding:5px 10px" onclick="createNew('file')"><i class="fas fa-plus"></i></button>
                <input type="file" id="fUp" hidden onchange="uploadFile(this)">
            </div>
        </div>
        
        <!-- Breadcrumb Navigation -->
        <div class="breadcrumb" id="breadcrumb"></div>
        
        <div id="fileList"></div>
    </div>
</div>

<div class="menu-overlay" id="menuOverlay" onclick="this.style.display='none'">
    <div class="menu-content" onclick="event.stopPropagation()">
        <div class="menu-item" id="btnSetStartup" style="color:var(--orange)"><i class="fas fa-rocket"></i> Set as Startup</div>
        <div class="menu-item" id="btnEdit"><i class="fas fa-edit"></i> Edit File</div>
        <div class="menu-item" id="btnRename"><i class="fas fa-pen"></i> Rename</div>
        <div class="menu-item" id="btnZip"><i class="fas fa-file-archive"></i> Archive</div>
        <div class="menu-item" id="btnUnzip"><i class="fas fa-box-open"></i> Unzip</div>
        <div class="menu-item" id="btnDelete" style="color:var(--danger)"><i class="fas fa-trash"></i> Delete</div>
    </div>
</div>

<div id="editor">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <span id="edFile" style="font-family:'JetBrains Mono'; font-size:13px;"></span>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-gray" onclick="closeEditor()">CLOSE</button>
            <button class="btn btn-blue" onclick="saveFile()">SAVE CHANGES</button>
        </div>
    </div>
    <textarea id="edText"></textarea>
</div>

<script>
let curSrv = null;
let logItv = null;
let currentSubPath = "";
let editorInstance = null;
let selectedFileForMenu = null;
let selectedIsDir = false;

// ===== HOME VIEW: Load Servers =====
async function loadSrv() {
    const r = await fetch('/servers');
    const d = await r.json();
    document.getElementById('srvList').innerHTML = d.servers.map(s => `
        <div class="srv-card animate__animated animate__fadeInUp">
            <div onclick='openSrv(${JSON.stringify(s)})' style="cursor:pointer; flex:1">
                <div style="font-weight:800; font-size:16px;">${s.name}</div>
                <div style="font-size:11px; color:var(--text-dim); margin-top:4px;">${s.folder}</div>
            </div>
            <div style="text-align:right">
                <div style="font-size:10px; color:${s.online?'#32d74b':'#666'}">${s.online?'RUNNING':'OFFLINE'}</div>
                <div style="font-size:10px; color:#555; margin-top:5px;">${s.cpu} | ${s.ram}</div>
            </div>
        </div>`).join('');
}

// ===== OPEN SERVER =====
function openSrv(s) {
    curSrv = s;
    document.getElementById('homeView').style.display = 'none';
    document.getElementById('manageView').style.display = 'block';
    document.getElementById('vSrvName').innerText = s.name;
    document.getElementById('vStartup').innerText = 'Startup: ' + (s.startup || 'main.py');
    currentSubPath = "";
    loadFiles();
    startLogs();
}

function goBack() {
    if(logItv) clearInterval(logItv);
    document.getElementById('manageView').style.display = 'none';
    document.getElementById('homeView').style.display = 'block';
    loadSrv();
}

// ===== CONSOLE LOGS =====
function startLogs() {
    if(logItv) clearInterval(logItv);
    logItv = setInterval(async () => {
        if(!curSrv) return;
        const r = await fetch(`/server/log/${curSrv.folder}`);
        const d = await r.json();
        const c = document.getElementById('console');
        if(d.log && d.log !== c.getAttribute('data-raw')) {
            c.setAttribute('data-raw', d.log);
            c.innerHTML = d.log.split('\n').map(l => l.trim() ? `<div class="log-line"><span class="log-time">[${new Date().toLocaleTimeString()}]</span>${l}</div>` : '').join('');
            c.scrollTop = c.scrollHeight;
        }
        document.getElementById('vUptime').innerText = d.uptime || 'OFFLINE';
        // Update startup info
        if(d.startup) document.getElementById('vStartup').innerText = 'Startup: ' + d.startup;
    }, 1000);
}

// ===== SERVER ACTIONS =====
async function srvAction(action) {
    const res = await fetch(`/server/action/${curSrv.folder}/${action}`, { method: 'POST' });
    const data = await res.json();
    if(data.status === 'error') {
        Swal.fire('Error', data.msg || 'Action failed', 'error');
    } else {
        notify(action.toUpperCase() + ' executed');
    }
}

// ===== FILE MANAGER =====
async function loadFiles() {
    const r = await fetch(`/files/list/${curSrv.folder}?path=${encodeURIComponent(currentSubPath)}`);
    const d = await r.json();
    
    // Update breadcrumb
    const bc = document.getElementById('breadcrumb');
    bc.innerHTML = '';
    const parts = currentSubPath.split('/').filter(p => p);
    let pathAccum = '';
    bc.innerHTML = `<span onclick="navigateTo('')">📁 root</span>`;
    parts.forEach((p, i) => {
        pathAccum += (pathAccum ? '/' : '') + p;
        const isLast = i === parts.length - 1;
        bc.innerHTML += ` <span style="color:${isLast ? '#fff' : 'var(--accent)'}">/</span> `;
        bc.innerHTML += `<span onclick="navigateTo('${pathAccum}')" style="color:${isLast ? '#fff' : 'var(--accent)'}">${p}</span>`;
    });

    document.getElementById('fileList').innerHTML = d.map(f => `
        <div class="file-item" onclick="${f.is_dir ? `navigateTo('${currentSubPath ? currentSubPath + '/' + f.name : f.name}')` : ''}">
            <span><i class="fas ${f.is_dir ? 'fa-folder' : 'fa-file'}"></i> ${f.name}</span>
            <div class="file-actions">
                ${!f.is_dir && !f.name.endsWith('.zip') ? `<button class="btn btn-orange" style="padding:2px 8px; font-size:8px;" onclick="event.stopPropagation(); setStartup('${f.name}')">🚀 Startup</button>` : ''}
                <button class="btn btn-gray" style="padding:2px 8px; font-size:8px;" onclick="event.stopPropagation(); openFileMenu('${f.name}', ${f.is_zip}, ${f.is_dir})">•••</button>
            </div>
        </div>`).join('');
}

function navigateTo(path) {
    currentSubPath = path;
    loadFiles();
}

// ===== SET STARTUP =====
async function setStartup(fileName) {
    const confirm = await Swal.fire({
        title: 'Set as Startup?',
        text: `"${fileName}" will be used to start this server.`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Yes, set it!',
        background: '#1c1c1e',
        color: '#fff'
    });
    if(confirm.isConfirmed) {
        const res = await fetch(`/server/set-startup/${curSrv.folder}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file: fileName })
        });
        const data = await res.json();
        if(data.status === 'success') {
            document.getElementById('vStartup').innerText = 'Startup: ' + fileName;
            notify('Startup file updated!');
        } else {
            Swal.fire('Error', 'Failed to set startup file', 'error');
        }
    }
}

// ===== FILE MENU =====
function openFileMenu(name, isZip, isDir) {
    selectedFileForMenu = name;
    selectedIsDir = isDir;
    document.getElementById('btnSetStartup').style.display = isDir ? 'none' : 'flex';
    document.getElementById('btnEdit').style.display = isDir ? 'none' : 'flex';
    document.getElementById('btnUnzip').style.display = isZip ? 'flex' : 'none';
    document.getElementById('btnZip').style.display = isDir ? 'flex' : 'none';
    
    document.getElementById('btnSetStartup').onclick = () => { document.getElementById('menuOverlay').style.display = 'none'; setStartup(name); };
    document.getElementById('btnEdit').onclick = () => { document.getElementById('menuOverlay').style.display = 'none'; editFile(name); };
    document.getElementById('btnUnzip').onclick = () => { document.getElementById('menuOverlay').style.display = 'none'; unzipAction(name); };
    document.getElementById('btnZip').onclick = () => { document.getElementById('menuOverlay').style.display = 'none'; zipFolder(name); };
    document.getElementById('btnRename').onclick = () => { document.getElementById('menuOverlay').style.display = 'none'; renameFile(name); };
    document.getElementById('btnDelete').onclick = () => { document.getElementById('menuOverlay').style.display = 'none'; deleteFile(name); };
    
    document.getElementById('menuOverlay').style.display = 'flex';
}

// ===== UNZIP =====
async function unzipAction(name) {
    Swal.fire({ title: 'Extracting...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    const res = await fetch(`/files/unzip/${curSrv.folder}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, path: currentSubPath })
    });
    const d = await res.json();
    Swal.close();
    if(d.status === 'success') { loadFiles(); notify("Extracted!"); }
    else { Swal.fire('Error', d.msg || 'Extraction failed', 'error'); }
}

// ===== ZIP FOLDER =====
async function zipFolder(name) {
    Swal.fire({ title: 'Zipping...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    const res = await fetch(`/files/zip-bulk/${curSrv.folder}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ names: [name], path: currentSubPath })
    });
    const d = await res.json();
    Swal.close();
    if(d.status === 'success') { loadFiles(); notify("Zipped!"); }
    else { Swal.fire('Error', 'Zipping failed', 'error'); }
}

// ===== RENAME =====
async function renameFile(name) {
    const { value: newName } = await Swal.fire({
        title: 'Rename',
        input: 'text',
        inputValue: name,
        background: '#1c1c1e',
        color: '#fff'
    });
    if(newName && newName !== name) {
        await fetch(`/files/rename/${curSrv.folder}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ old: name, new: newName, path: currentSubPath })
        });
        loadFiles();
        notify('Renamed');
    }
}

// ===== DELETE =====
async function deleteFile(name) {
    const res = await Swal.fire({
        title: 'Delete?',
        text: name,
        icon: 'warning',
        showCancelButton: true,
        background: '#1c1c1e',
        color: '#fff'
    });
    if(res.isConfirmed) {
        await fetch(`/files/delete-bulk/${curSrv.folder}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ names: [name], path: currentSubPath })
        });
        loadFiles();
        notify('Deleted');
    }
}

// ===== EDIT FILE =====
async function editFile(name) {
    const p = currentSubPath ? currentSubPath + '/' + name : name;
    const res = await fetch(`/files/content/${curSrv.folder}/${name}?path=${encodeURIComponent(currentSubPath)}`);
    const data = await res.json();
    document.getElementById('edFile').innerText = name;
    document.getElementById('edText').value = data.content || '';
    document.getElementById('editor').style.display = 'block';
    setTimeout(() => {
        if(!editorInstance) {
            editorInstance = CodeMirror.fromTextArea(document.getElementById('edText'), {
                mode: "python",
                theme: "dracula",
                lineNumbers: true,
                indentUnit: 4,
                tabSize: 4
            });
        } else {
            editorInstance.setValue(data.content || '');
        }
        editorInstance.refresh();
    }, 100);
}

async function saveFile() {
    const name = document.getElementById('edFile').innerText;
    const content = editorInstance.getValue();
    await fetch(`/files/save/${curSrv.folder}/${name}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: content, path: currentSubPath })
    });
    closeEditor();
    notify('Saved!');
}

function closeEditor() {
    document.getElementById('editor').style.display = 'none';
    if(editorInstance) editorInstance.setValue('');
}

// ===== UPLOAD =====
async function uploadFile(input) {
    if(!input.files[0]) return;
    let fd = new FormData();
    fd.append("file", input.files[0]);
    fd.append("path", currentSubPath);
    await fetch(`/files/upload/${curSrv.folder}`, { method: 'POST', body: fd });
    loadFiles();
    notify("Uploaded");
    input.value = '';
}

// ===== CREATE =====
async function createNew(type) {
    const { value: n } = await Swal.fire({
        title: 'New ' + type,
        input: 'text',
        background: '#1c1c1e',
        color: '#fff'
    });
    if(n) {
        const url = type === 'file' ? `/files/create-file/${curSrv.folder}` : `/files/create-folder/${curSrv.folder}`;
        await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: n, path: currentSubPath })
        });
        loadFiles();
        notify('Created');
    }
}

// ===== CONSOLE COMMAND =====
function sendConsoleCommand() {
    const cmd = document.getElementById('termCmd').value;
    if(cmd) {
        fetch(`/server/action/${curSrv.folder}/command`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: cmd })
        });
        document.getElementById('termCmd').value = '';
    }
}

// ===== CREATE SERVER =====
async function createServer() {
    const { value: n } = await Swal.fire({
        title: 'Server Name',
        input: 'text',
        background: '#1c1c1e',
        color: '#fff'
    });
    if(n) {
        await fetch('/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: n })
        });
        loadSrv();
    }
}

function notify(t) {
    Swal.fire({ toast: true, position: 'top-end', timer: 1500, title: t, showConfirmButton: false, icon: 'success', background: '#1c1c1e', color: '#fff' });
}

document.addEventListener('DOMContentLoaded', loadSrv);
</script>
</body>
</html>
